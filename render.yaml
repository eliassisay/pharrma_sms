services:
  - type: web
    name: telegram-sms-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python multi_sender.py
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: PHONE_NUMBER
        sync: false
      - key: MONGO_URI
        sync: false
      - key: STRING_SESSION
        sync: false

